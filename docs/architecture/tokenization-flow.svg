    <text x="27.5" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" font-weight="bold" writing-mode="tb">5. STRUCTURED PRODUCTS</text>
    <text x="27.5" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Bonds</text>
    <text x="27.5" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Forwards</text>
