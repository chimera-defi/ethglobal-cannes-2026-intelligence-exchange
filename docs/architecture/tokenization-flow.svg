    <text x="87.5" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9d174d">AIU Perpetuals</text>
    <text x="87.5" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Long/short with</text>
    <text x="87.5" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">10x max leverage</text>
    
    <rect x="15" y="215" width="145" height="65" rx="8" fill="white" stroke="#f472b6" stroke-width="1.5"/>
    <text x="87.5" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#9d174d">iIX Vaults</text>
    <text x="87.5" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Cohort-specific</text>
    <text x="87.5" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">exposure products</text>
  </g>
  
  <!-- === TRANSITION 4-5 === -->
