<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 520">
  <!-- Background -->
  <rect width="950" height="520" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="475" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">
    Intelligence Tokenization Flow
  </text>
  <text x="475" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">
