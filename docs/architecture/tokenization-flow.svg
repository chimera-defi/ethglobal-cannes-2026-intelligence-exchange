<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">
    Intelligence Tokenization Flow
  </text>
  
  <!-- Phase 1: Settlement -->
  <rect x="50" y="60" width="140" height="280" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">1. Settlement</text>
  
  <rect x="65" y="100" width="110" height="50" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">Job Completed</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Human Review</text>
  
  <rect x="65" y="160" width="110" height="50" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="120" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">USDC Payout</text>
  <text x="120" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Worker Paid</text>
  
  <rect x="65" y="220" width="110" height="50" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="120" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">10% Platform Fee</text>
  <text x="120" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">To Treasury</text>
  
  <!-- Arrow 1 -->
  <path d="M 190 185 L 230 185" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 2: Receipts -->
  <rect x="230" y="60" width="140" height="280" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#166534">2. Receipts</text>
  
  <rect x="245" y="100" width="110" height="50" rx="4" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">WorkReceipt</text>
  <text x="300" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">ERC-1155 NFT</text>
  <text x="300" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#22c55e">✓ Minted</text>
  
  <rect x="245" y="160" width="110" height="50" rx="4" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">AIU Calculated</text>
  <text x="300" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Task × Quality</text>
  <text x="300" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#22c55e">✓ Normalized</text>
  
  <rect x="245" y="220" width="110" height="50" rx="4" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Postgres Updated</text>
  <text x="300" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Hot Reputation</text>
  
  <!-- Arrow 2 -->
  <path d="M 370 185 L 410 185" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 3: Tokenization -->
  <rect x="410" y="60" width="140" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#92400e">3. Tokenization</text>
  
  <rect x="425" y="100" width="110" height="50" rx="4" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">IXP Points</text>
  <text x="480" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Creator + Finisher</text>
  <text x="480" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b">→ Convert to IX</text>
  
  <rect x="425" y="160" width="110" height="50" rx="4" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">IX Token</text>
  <text x="480" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Epoch Rewards</text>
  
  <rect x="425" y="220" width="110" height="50" rx="4" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">On-Chain Sync</text>
  <text x="480" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Agent-triggered</text>
  
  <!-- Arrow 3 -->
  <path d="M 550 185 L 590 185" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Phase 4: Derivatives -->
  <rect x="590" y="60" width="160" height="280" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="670" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#9d174d">4. Derivatives</text>
  
  <rect x="605" y="100" width="130" height="50" rx="4" fill="white" stroke="#f472b6" stroke-width="1"/>
  <text x="670" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">AIU Index</text>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">24h TWAP Oracle</text>
  <text x="670" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ec4899">Price Discovery</text>
  
  <rect x="605" y="160" width="130" height="50" rx="4" fill="white" stroke="#f472b6" stroke-width="1"/>
  <text x="670" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">AIU Perpetuals</text>
  <text x="670" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">10x Max Leverage</text>
  <text x="670" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ec4899">Long/Short AIU</text>
  
  <rect x="605" y="220" width="130" height="50" rx="4" fill="white" stroke="#f472b6" stroke-width="1"/>
  <text x="670" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">iIX Vaults</text>
  <text x="670" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Cohort Exposure</text>
  
  <!-- Security Note -->
  <rect x="50" y="350" width="700" height="40" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#475569">
    🔒 Security: Broker-signed attestations prevent agents from faking reputation
  </text>
  <text x="400" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">
    Contract verifies ECDSA signature from authorized attestor before updating on-chain reputation
  </text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>