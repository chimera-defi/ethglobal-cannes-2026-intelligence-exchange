    <rect x="0" y="38" width="170" height="12" fill="#3b82f6"/>
    <text x="85" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">1. SETTLEMENT</text>
    <text x="85" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#bfdbfe">USDC on Arc</text>
    
    <!-- Content cards -->
    <rect x="15" y="65" width="140" height="65" rx="8" fill="white" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="85" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">Job Completed</text>
    <text x="85" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Human review gate</text>
    <text x="85" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Acceptance required</text>
    
    <rect x="15" y="140" width="140" height="65" rx="8" fill="white" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="85" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">USDC Payout</text>
    <text x="85" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Worker receives</text>
    <text x="85" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">payment in stablecoin</text>
    
    <rect x="15" y="215" width="140" height="65" rx="8" fill="white" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="85" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">Platform Fee</text>
    <text x="85" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">10% to treasury</text>
    <text x="85" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">for protocol growth</text>
