    <rect x="15" y="215" width="140" height="65" rx="8" fill="white" stroke="#4ade80" stroke-width="1.5"/>
    <text x="85" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#166534">Postgres Update</text>
    <text x="85" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Hot reputation</text>
