<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480">
  <!-- Background -->
  <rect width="1000" height="480" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">
    Intelligence Tokenization Flow
  </text>
  <text x="500" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">
    Each phase builds on proven foundations — no shortcuts
  </text>
  
  <!-- === PHASE 1: SETTLEMENT === -->
  <g transform="translate(30, 85)">
    <!-- Phase number badge -->
    <circle cx="25" cy="0" r="18" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <text x="25" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">1</text>
    
    <!-- Main box -->
    <rect y="20" width="180" height="220" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="20" width="180" height="40" rx="10" fill="#3b82f6"/>
    <rect x="0" y="50" width="180" height="10" fill="#3b82f6"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">SETTLEMENT</text>
    
    <!-- Content -->
    <rect x="15" y="70" width="150" height="50" rx="6" fill="white" stroke="#60a5fa" stroke-width="1"/>
    <text x="90" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">Job Completed</text>
    <text x="90" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Human review required</text>
    
    <rect x="15" y="130" width="150" height="50" rx="6" fill="white" stroke="#60a5fa" stroke-width="1"/>
    <text x="90" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">USDC Payout</text>
    <text x="90" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Worker paid in stablecoin</text>
    
    <rect x="15" y="190" width="150" height="40" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1"/>
    <text x="90" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e40af">10% Platform Fee</text>
  </g>
  
  <!-- === ARROW 1-2 (bottom) === -->
  <g transform="translate(210, 260)">
    <path d="M 0 0 L 100 0" stroke="#3b82f6" stroke-width="4" fill="none" marker-end="url(#arrowheadBlue)"/>
  </g>
  
  <!-- === TRANSITION BOX 1-2 === -->
  <g transform="translate(210, 290)">
    <rect width="100" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">VOLUME &amp;</text>
    <text x="50" y="37" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">PRICE</text>
    <text x="50" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">DISCOVERY</text>
  </g>
  
  <!-- === PHASE 2: RECEIPTS === -->
  <g transform="translate(320, 85)">
    <circle cx="25" cy="0" r="18" fill="#22c55e" stroke="#166534" stroke-width="2"/>
    <text x="25" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">2</text>
    
    <rect y="20" width="180" height="220" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <rect x="0" y="20" width="180" height="40" rx="10" fill="#22c55e"/>
    <rect x="0" y="50" width="180" height="10" fill="#22c55e"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">RECEIPTS</text>
    
    <rect x="15" y="70" width="150" height="50" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="90" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">WorkReceipt NFT</text>
    <text x="90" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Minted on acceptance</text>
    
    <rect x="15" y="130" width="150" height="50" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
    <text x="90" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">AIU Calculated</text>
    <text x="90" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Task weight x Quality</text>
    
    <rect x="15" y="190" width="150" height="40" rx="6" fill="#f0fdf4" stroke="#4ade80" stroke-width="1"/>
    <text x="90" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534">Postgres Reputation</text>
  </g>
  
  <!-- === ARROW 2-3 === -->
  <g transform="translate(500, 260)">
    <path d="M 0 0 L 100 0" stroke="#22c55e" stroke-width="4" fill="none" marker-end="url(#arrowheadGreen)"/>
  </g>
  
  <!-- === TRANSITION BOX 2-3 === -->
  <g transform="translate(500, 290)">
    <rect width="100" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="50" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#166534">INDEX</text>
    <text x="50" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#166534">CREDIBILITY</text>
  </g>
  
  <!-- === PHASE 3: TOKENIZATION === -->
  <g transform="translate(610, 85)">
    <circle cx="25" cy="0" r="18" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
    <text x="25" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">3</text>
    
    <rect y="20" width="180" height="220" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="20" width="180" height="40" rx="10" fill="#f59e0b"/>
    <rect x="0" y="50" width="180" height="10" fill="#f59e0b"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">TOKENIZATION</text>
    
    <rect x="15" y="70" width="150" height="50" rx="6" fill="white" stroke="#fbbf24" stroke-width="1"/>
    <text x="90" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">IXP Points</text>
    <text x="90" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Creator + Finisher rewards</text>
    
    <rect x="15" y="130" width="150" height="50" rx="6" fill="white" stroke="#fbbf24" stroke-width="1"/>
    <text x="90" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">IX Token</text>
    <text x="90" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Epoch distribution</text>
    
    <rect x="15" y="190" width="150" height="40" rx="6" fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
    <text x="90" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">On-Chain Sync</text>
  </g>
  
  <!-- === ARROW 3-4 === -->
  <g transform="translate(790, 260)">
    <path d="M 0 0 L 90 0" stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrowheadAmber)"/>
  </g>
  
  <!-- === TRANSITION BOX 3-4 === -->
  <g transform="translate(785, 290)">
    <rect width="100" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="50" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#92400e">LIQUIDITY &amp;</text>
    <text x="50" y="37" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#92400e">STAKING</text>
    <text x="50" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#92400e">TVL GROWTH</text>
  </g>
  
  <!-- === PHASE 4: DERIVATIVES === -->
  <g transform="translate(900, 85)">
    <circle cx="25" cy="0" r="18" fill="#ec4899" stroke="#9d174d" stroke-width="2"/>
    <text x="25" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">4</text>
    
    <rect y="20" width="180" height="220" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <rect x="0" y="20" width="180" height="40" rx="10" fill="#ec4899"/>
    <rect x="0" y="50" width="180" height="10" fill="#ec4899"/>
    <text x="90" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">DERIVATIVES</text>
    
    <rect x="15" y="70" width="150" height="50" rx="6" fill="white" stroke="#f472b6" stroke-width="1"/>
    <text x="90" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">AIU Index</text>
    <text x="90" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">24h TWAP Oracle</text>
    
    <rect x="15" y="130" width="150" height="50" rx="6" fill="white" stroke="#f472b6" stroke-width="1"/>
    <text x="90" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">AIU Perpetuals</text>
    <text x="90" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">10x max leverage</text>
    
    <rect x="15" y="190" width="150" height="40" rx="6" fill="#fdf2f8" stroke="#f472b6" stroke-width="1"/>
    <text x="90" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">iIX Vaults</text>
  </g>
  
  <!-- === ARROW 4-5 === -->
  <g transform="translate(1080, 175)">
    <path d="M 0 0 L 50 0" stroke="#a855f7" stroke-width="3" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowheadPurple)"/>
  </g>
  
  <!-- === TRANSITION BOX 4-5 === -->
  <g transform="translate(1075, 200)">
    <rect width="60" height="50" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="30" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#7c3aed">MATURE</text>
    <text x="30" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#7c3aed">MARKETS</text>
  </g>
  
  <!-- === PHASE 5: FUTURE (smaller) === -->
  <g transform="translate(1130, 85)">
    <circle cx="20" cy="0" r="15" fill="#a855f7" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="20" y="4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">5</text>
    
    <rect y="20" width="70" height="220" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
    <text x="35" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" font-weight="bold" writing-mode="tb">STRUCTURED</text>
    <text x="35" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" font-weight="bold" writing-mode="tb">PRODUCTS</text>
  </g>
  
  <!-- === BOTTOM NOTE === -->
  <text x="500" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" font-style="italic">
    Transition requires: proven volume → credible index → liquidity depth → market maturity
  </text>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowheadBlue" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#3b82f6"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#22c55e"/>
    </marker>
    <marker id="arrowheadAmber" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f59e0b"/>
    </marker>
    <marker id="arrowheadPurple" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#a855f7"/>
    </marker>
  </defs>
</svg>