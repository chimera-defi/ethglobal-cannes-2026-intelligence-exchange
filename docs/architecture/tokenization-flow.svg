<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <!-- Background -->
  <rect width="800" height="420" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">
    Intelligence Tokenization Flow
  </text>
  
  <!-- Phase 1: Settlement -->
  <rect x="50" y="70" width="140" height="260" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">1. Settlement</text>
  
  <rect x="65" y="110" width="110" height="50" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">Job Completed</text>
  <text x="120" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Human Review</text>
  
  <rect x="65" y="170" width="110" height="50" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="120" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">USDC Payout</text>
  <text x="120" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Worker Paid</text>
  
  <rect x="65" y="230" width="110" height="50" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="120" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">10% Platform Fee</text>
  <text x="120" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">To Treasury</text>
  
  <!-- Arrow 1: Settlement to Receipts -->
  <path d="M 190 195 L 230 195" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowheadBlue)"/>
  
  <!-- Transition Label 1: Volume and Price Discovery -->
  <rect x="175" y="155" width="70" height="32" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" opacity="0.95"/>
  <text x="210" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#1e40af">VOLUME &amp;</text>
  <text x="210" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#1e40af">PRICE DISCOVERY</text>
  
  <!-- Phase 2: Receipts -->
  <rect x="230" y="70" width="140" height="260" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#166534">2. Receipts</text>
  
  <rect x="245" y="110" width="110" height="50" rx="4" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">WorkReceipt</text>
  <text x="300" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">ERC-1155 NFT</text>
  <text x="300" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#22c55e">✓ Minted</text>
  
  <rect x="245" y="170" width="110" height="50" rx="4" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">AIU Calculated</text>
  <text x="300" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Task × Quality</text>
  <text x="300" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#22c55e">✓ Normalized</text>
  
  <rect x="245" y="230" width="110" height="50" rx="4" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Postgres Updated</text>
  <text x="300" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Hot Reputation</text>
  
  <!-- Arrow 2: Receipts to Tokenization -->
  <path d="M 370 195 L 410 195" stroke="#22c55e" stroke-width="3" fill="none" marker-end="url(#arrowheadGreen)"/>
  
  <!-- Transition Label 2: Index Credibility -->
  <rect x="355" y="155" width="70" height="32" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1" opacity="0.95"/>
  <text x="390" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#166534">INDEX</text>
  <text x="390" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#166534">CREDIBILITY</text>
  
  <!-- Phase 3: Tokenization -->
  <rect x="410" y="70" width="140" height="260" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#92400e">3. Tokenization</text>
  
  <rect x="425" y="110" width="110" height="50" rx="4" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">IXP Points</text>
  <text x="480" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Creator + Finisher</text>
  <text x="480" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#f59e0b">→ Convert to IX</text>
  
  <rect x="425" y="170" width="110" height="50" rx="4" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">IX Token</text>
  <text x="480" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Epoch Rewards</text>
  
  <rect x="425" y="230" width="110" height="50" rx="4" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">On-Chain Sync</text>
  <text x="480" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Agent-triggered</text>
  
  <!-- Arrow 3: Tokenization to Derivatives -->
  <path d="M 550 195 L 590 195" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowheadAmber)"/>
  
  <!-- Transition Label 3: Liquidity and Staking -->
  <rect x="535" y="155" width="70" height="32" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" opacity="0.95"/>
  <text x="570" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#92400e">LIQUIDITY &amp;</text>
  <text x="570" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#92400e">STAKING</text>
  
  <!-- Phase 4: Derivatives -->
  <rect x="590" y="70" width="160" height="260" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#9d174d">4. Derivatives</text>
  
  <rect x="605" y="110" width="130" height="50" rx="4" fill="white" stroke="#f472b6" stroke-width="1"/>
  <text x="670" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">AIU Index</text>
  <text x="670" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">24h TWAP Oracle</text>
  <text x="670" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ec4899">Price Discovery</text>
  
  <rect x="605" y="170" width="130" height="50" rx="4" fill="white" stroke="#f472b6" stroke-width="1"/>
  <text x="670" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">AIU Perpetuals</text>
  <text x="670" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">10x Max Leverage</text>
  <text x="670" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ec4899">Long/Short AIU</text>
  
  <rect x="605" y="230" width="130" height="50" rx="4" fill="white" stroke="#f472b6" stroke-width="1"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9d174d">iIX Vaults</text>
  <text x="670" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Cohort Exposure</text>
  
  <!-- Future Phase Indicator (Phase 5) -->
  <rect x="765" y="120" width="25" height="150" rx="4" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" stroke-dasharray="4"/>
  <text x="777" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7c3aed" font-weight="bold" writing-mode="tb">5. STRUCTURED PRODUCTS</text>
  <text x="777" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Mature Markets</text>
  
  <!-- Arrow 4: Derivatives to Structured Products -->
  <path d="M 750 195 L 765 195" stroke="#a855f7" stroke-width="2" fill="none" stroke-dasharray="4" marker-end="url(#arrowheadPurple)"/>
  
  <!-- Security Note -->
  <rect x="50" y="350" width="700" height="55" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#475569">
    🔒 Security: Broker-signed attestations prevent agents from faking reputation
  </text>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">
    Contract verifies ECDSA signature from authorized attestor before updating on-chain reputation
  </text>
  <text x="400" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8" font-style="italic">
    Transition prerequisites ensure each phase builds on proven foundations
  </text>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowheadAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowheadPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>
</svg>