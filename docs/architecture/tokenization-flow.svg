    <rect x="0" y="-45" width="45" height="32" rx="16" fill="#ffffff" stroke="#a855f7" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="22.5" y="-30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#7c3aed">MATURE</text>
    <text x="22.5" y="-20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#7c3aed">MARKETS</text>
