<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="1100" height="650">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#070D1A"/>
    </linearGradient>
    <linearGradient id="painGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="opportunityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="iexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowRed" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#10b981"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1100" height="650" fill="url(#bgGrad)"/>
  
  <!-- === HEADER === -->
  <text x="550" y="45" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#C8D6E8">
    THE MISMATCH IEX SOLVES
  </text>
  <text x="550" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4B5A70">
    End of week: Two teams. Opposite problems. One solution.
  </text>
  
  <!-- === TEAM A: THE PAIN (Left) === -->
  <rect x="50" y="100" width="300" height="420" rx="12" fill="#131F32" stroke="#dc2626" stroke-width="3" filter="url(#redGlow)"/>
  
  <!-- Team A Header -->
  <rect x="50" y="100" width="300" height="60" rx="12" fill="url(#painGrad)"/>
  <text x="200" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    TEAM A: AI STARTUP
  </text>
  <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fecaca">
    Overflow Demand
  </text>
  
  <!-- Problem Visual -->
  <rect x="70" y="175" width="260" height="120" rx="8" fill="#1a2d47" stroke="#7f1d1d" stroke-width="2"/>
  
  <!-- Stacked Tasks -->
  <rect x="90" y="195" width="100" height="15" rx="2" fill="#ef4444" opacity="0.9"/>
  <rect x="90" y="215" width="100" height="15" rx="2" fill="#ef4444" opacity="0.8"/>
  <rect x="90" y="235" width="100" height="15" rx="2" fill="#ef4444" opacity="0.7"/>
  <rect x="90" y="255" width="100" height="15" rx="2" fill="#ef4444" opacity="0.6"/>
  <text x="140" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fca5a5">25 tasks pending</text>
  
  <!-- Empty Wallet -->
  <circle cx="230" cy="235" r="30" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="242" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#450a0a">💸</text>
  <text x="230" y="280" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fca5a5">$0 budget left</text>
  
  <!-- The Crisis -->
  <rect x="70" y="305" width="260" height="80" rx="8" fill="#450a0a" stroke="#dc2626" stroke-width="2"/>
  <text x="200" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fca5a5">
    THE CRISIS
  </text>
  <text x="200" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8D6E8">
    Product launch in 3 days
  </text>
  <text x="200" y="368" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8D6E8">
    Can't hire fast enough
  </text>
  
  <!-- Status -->
  <rect x="100" y="400" width="200" height="50" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fca5a5" font-weight="bold">
    STATUS: BLOCKED
  </text>
  <text x="200" y="438" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8D6E8">
    Need: Intelligence capacity
  </text>
  
  <!-- === TEAM B: THE OPPORTUNITY (Right) === -->
  <rect x="750" y="100" width="300" height="420" rx="12" fill="#131F32" stroke="#2563eb" stroke-width="3" filter="url(#blueGlow)"/>
  
  <!-- Team B Header -->
  <rect x="750" y="100" width="300" height="60" rx="12" fill="url(#opportunityGrad)"/>
  <text x="900" y="125" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    TEAM B: DEV AGENCY
  </text>
  <text x="900" y="145" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bfdbfe">
    Excess Capacity
  </text>
  
  <!-- Opportunity Visual -->
  <rect x="770" y="175" width="260" height="120" rx="8" fill="#1a2d47" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Empty Task List -->
  <rect x="790" y="195" width="100" height="80" rx="4" fill="#0D1625" stroke="#1E2D42" stroke-width="1" stroke-dasharray="4"/>
  <text x="840" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5A70" font-style="italic">
    No active
  </text>
  <text x="840" y="250" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5A70" font-style="italic">
    projects
  </text>
  <text x="840" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#93c5fd">Capacity: 40 hrs/week</text>
  
  <!-- Full Wallet -->
  <circle cx="930" cy="235" r="30" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="930" y="242" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#172554">💰</text>
  <text x="930" y="280" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#93c5fd">Budget available</text>
  
  <!-- The Opportunity -->
  <rect x="770" y="305" width="260" height="80" rx="8" fill="#172554" stroke="#2563eb" stroke-width="2"/>
  <text x="900" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#93c5fd">
    THE OPPORTUNITY
  </text>
  <text x="900" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8D6E8">
    Between client projects
  </text>
  <text x="900" y="368" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8D6E8">
    Engineers on bench
  </text>
  
  <!-- Status -->
  <rect x="800" y="400" width="200" height="50" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="900" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#93c5fd" font-weight="bold">
    STATUS: IDLE
  </text>
  <text x="900" y="438" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C8D6E8">
    Has: Intelligence capacity
  </text>
  
  <!-- === CENTER: IEX BRIDGE === -->
  <rect x="400" y="120" width="300" height="380" rx="16" fill="url(#iexGrad)" stroke="#fbbf24" stroke-width="4" filter="url(#goldGlow)"/>
  
  <!-- IEX Header -->
  <rect x="400" y="120" width="300" height="70" rx="16" fill="#92400e"/>
  <text x="550" y="155" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#FFFFFF">
    IEX
  </text>
  <text x="550" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fef3c7">
    Intelligence Exchange
  </text>
  
  <!-- Matching Arrows -->
  <line x1="350" y1="250" x2="410" y2="250" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)"/>
  <text x="380" y="240" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fca5a5">Posts job</text>
  
  <line x1="690" y1="250" x2="630" y2="250" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="660" y="240" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#93c5fd">Claims job</text>
  
  <!-- Transaction Box -->
  <rect x="420" y="200" width="260" height="140" rx="8" fill="#78350f" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Job Card -->
  <rect x="435" y="215" width="230" height="50" rx="6" fill="#131F32" stroke="#1E2D42"/>
  <text x="470" y="235" font-family="sans-serif" font-size="10" fill="#C8D6E8">Build landing page</text>
  <text x="470" y="252" font-family="sans-serif" font-size="9" fill="#4B5A70">Est: 4 hours</text>
  <text x="630" y="245" text-anchor="end" font-family="monospace" font-size="14" font-weight="bold" fill="#10b981">$500</text>
  
  <!-- Flow -->
  <text x="550" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fef3c7">
    Team A pays → Escrow holds → Team B delivers
  </text>
  <text x="550" y="308" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fef3c7">
    Team A accepts → Escrow releases → Team B earns
  </text>
  
  <!-- Platform Fee -->
  <rect x="450" y="325" width="200" height="30" rx="4" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="550" y="344" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fde68a">
    IEX Fee: 10% ($50)
  </text>
  
  <!-- === BOTTOM: OUTCOME === -->
  <rect x="150" y="540" width="800" height="90" rx="8" fill="url(#successGrad)" stroke="#34d399" stroke-width="2"/>
  
  <text x="300" y="575" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    TEAM A WINS
  </text>
  <text x="300" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d1fae5">
    Launched on time
  </text>
  <text x="300" y="615" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d1fae5">
    No hiring delay
  </text>
  
  <text x="550" y="590" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#FFFFFF">
    ⚡ WIN-WIN ⚡
  </text>
  
  <text x="800" y="575" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">
    TEAM B WINS
  </text>
  <text x="800" y="600" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d1fae5">
    +$450 revenue
  </text>
  <text x="800" y="615" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d1fae5">
    Zero idle time
  </text>
  
  <!-- Tagline -->
  <text x="550" y="645" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4B5A70" font-style="italic">
    Intelligence capacity: now a tradable commodity
  </text>
</svg>