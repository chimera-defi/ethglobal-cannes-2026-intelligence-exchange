      <stop offset="100%" style="stop-color:#070D1A"/>
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f35"/>
      <stop offset="100%" style="stop-color:#0D1625"/>
