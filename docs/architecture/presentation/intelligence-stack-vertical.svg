<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <!-- Glow effects -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="amberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#070D1A"/>
    </linearGradient>
    
    <!-- Arrow -->
    <marker id="upArrow" markerWidth="12" markerHeight="12" refX="6" refY="12" orient="auto">
      <polygon points="0,0 12,0 6,12" fill="#4B5A70"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="800" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="#C8D6E8">
    THE INTELLIGENCE COMMODITY STACK
  </text>
  
  <!-- === LAYER 5: MARKETS (Top) === -->
  <g transform="translate(100, 70)">
    <rect x="0" y="0" width="800" height="110" rx="8" fill="#f59e0b" stroke="#fbbf24" stroke-width="3" filter="url(#amberGlow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#000000">
      📈 DERIVATIVES &amp; FINANCIAL MARKETS
    </text>
    <text x="400" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#451a03">
      AIU Perpetuals • Task Futures • Receipt Vaults • Intelligence Bonds
    </text>
    <text x="400" y="85" text-anchor="middle" font-family="monospace" font-size="12" fill="#78350f">
      Hedge intelligence costs • Trade productivity exposure • Fixed income from fees
    </text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="180" x2="500" y2="200" stroke="#4B5A70" stroke-width="3" marker-end="url(#upArrow)"/>
  
  <!-- === LAYER 4: IEX BROKER === -->
  <g transform="translate(150, 210)">
    <rect x="0" y="0" width="700" height="100" rx="12" fill="#2563eb" stroke="#60A5FA" stroke-width="4" filter="url(#blueGlow)"/>
    <text x="350" y="40" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#FFFFFF">
      IEX / INTELLEX
    </text>
    <text x="350" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#dbeafe">
      Intelligence Broker • Job Discovery • Quality Verification • USDC Settlement
    </text>
    <text x="350" y="88" text-anchor="middle" font-family="monospace" font-size="11" fill="#93c5fd">
      ⚡ Verify • Coordinate • Settle ⚡
    </text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="310" x2="500" y2="330" stroke="#4B5A70" stroke-width="3" marker-end="url(#upArrow)"/>
  
  <!-- === LAYER 3: AGENTS === -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="900" height="90" rx="6" fill="#131F32" stroke="#3B82F6" stroke-width="2"/>
    <text x="450" y="30" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#C8D6E8">
      🤖 AGENT LAYER — Autonomous Workers
    </text>
    
    <!-- Agent boxes -->
    <rect x="30" y="45" width="190" height="35" rx="4" fill="#1a2d47" stroke="#3B82F6" stroke-width="1"/>
    <text x="125" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C8D6E8">Claude Code • Developer</text>
    
    <rect x="240" y="45" width="160" height="35" rx="4" fill="#1a2d47" stroke="#3B82F6" stroke-width="1"/>
    <text x="320" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C8D6E8">Kimi • Research</text>
    
    <rect x="420" y="45" width="160" height="35" rx="4" fill="#1a2d47" stroke="#3B82F6" stroke-width="1"/>
    <text x="500" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C8D6E8">Codex • Contracts</text>
    
    <rect x="600" y="45" width="270" height="35" rx="4" fill="#1a2d47" stroke="#3B82F6" stroke-width="1"/>
    <text x="735" y="67" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C8D6E8">Custom Agents • 247 Active Workers</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="430" x2="500" y2="450" stroke="#4B5A70" stroke-width="3" marker-end="url(#upArrow)"/>
  
  <!-- === LAYER 2: MODELS === -->
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="900" height="90" rx="6" fill="#0D1625" stroke="#1E2D42" stroke-width="2"/>
    <text x="450" y="28" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#C8D6E8">
      🧠 MODEL LAYER — Differentiated Intelligence
    </text>
    
    <!-- Model pills -->
    <rect x="50" y="45" width="180" height="32" rx="16" fill="#131F32" stroke="#10B981" stroke-width="1"/>
    <text x="140" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#10B981">GPT-4o / o1</text>
    
    <rect x="250" y="45" width="180" height="32" rx="16" fill="#131F32" stroke="#F59E0B" stroke-width="1"/>
    <text x="340" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#F59E0B">Claude 3.5/3.7</text>
    
    <rect x="450" y="45" width="180" height="32" rx="16" fill="#131F32" stroke="#3B82F6" stroke-width="1"/>
    <text x="540" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3B82F6">Gemini 2.5</text>
    
    <rect x="650" y="45" width="200" height="32" rx="16" fill="#131F32" stroke="#EC4899" stroke-width="1"/>
    <text x="750" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#EC4899">Llama / DeepSeek</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="550" x2="500" y2="570" stroke="#4B5A70" stroke-width="3" marker-end="url(#upArrow)"/>
  
  <!-- === LAYER 1: COMPUTE (Bottom) === -->
  <g transform="translate(100, 580)">
    <rect x="0" y="0" width="800" height="100" rx="6" fill="#070D1A" stroke="#1E2D42" stroke-width="2"/>
    <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#C8D6E8">
      🔧 COMPUTE LAYER — Hardware Foundation
    </text>
    
    <!-- GPU boxes -->
    <rect x="50" y="45" width="160" height="42" rx="4" fill="#0D1625" stroke="#1E2D42" stroke-width="1"/>
    <text x="130" y="62" text-anchor="middle" font-family="monospace" font-size="14" fill="#3B82F6">GPU</text>
    <text x="130" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5A70">NVIDIA A100</text>
    
    <rect x="230" y="45" width="160" height="42" rx="4" fill="#0D1625" stroke="#1E2D42" stroke-width="1"/>
    <text x="310" y="62" text-anchor="middle" font-family="monospace" font-size="14" fill="#3B82F6">GPU</text>
    <text x="310" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5A70">NVIDIA H100</text>
    
    <rect x="410" y="45" width="160" height="42" rx="4" fill="#0D1625" stroke="#1E2D42" stroke-width="1"/>
    <text x="490" y="62" text-anchor="middle" font-family="monospace" font-size="14" fill="#3B82F6">GPU</text>
    <text x="490" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5A70">AMD MI300</text>
    
    <rect x="590" y="45" width="160" height="42" rx="4" fill="#0D1625" stroke="#1E2D42" stroke-width="1"/>
    <text x="670" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#3B82F6">CLOUD</text>
    <text x="670" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#4B5A70">AWS • GCP • Azure</text>
  </g>
  
  <!-- Bottom labels -->
  <text x="500" y="725" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#4B5A70">
    Intelligence is ephemeral. Compute is mechanical.
  </text>
  <text x="500" y="755" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#C8D6E8">
    IEX is building the infrastructure to price, verify, and trade
  </text>
  <text x="500" y="780" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#F59E0B">
    INTELLIGENCE ITSELF
  </text>
</svg>