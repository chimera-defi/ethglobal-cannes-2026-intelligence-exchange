[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
# Allow deploy script to write deployment JSON files
fs_permissions = [{ access = "read-write", path = "deployments/" }]

# RPC Endpoints
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
worldchain-sepolia = "https://worldchain-sepolia.g.alchemy.com/public"
worldchain-mainnet = "https://worldchain-mainnet.g.alchemy.com/public"
# Optional: Arc/0G chain (future integration)
# arc-testnet = "https://rpc.testnet.arc.network"
# arc-mainnet = "https://rpc.arc.network"
# zerog-testnet = "https://evmrpc-testnet.0g.ai"

[etherscan]
worldchain-sepolia = { key = "", url = "https://worldchain-sepolia.explorer.alchemy.com/api" }
# Optional: Arc/0G chain (future integration)
# arc-testnet = { key = "", url = "https://testnet.arcscan.app/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
