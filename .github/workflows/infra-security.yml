name: Infra Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  infra-hardening-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Infra security gate
        run: |
          echo "::notice::Infra hardening tests require docker-compose with Redis + Postgres."
          echo "::notice::Run 'make test-infra-security' locally in a Docker-enabled environment."
          echo "CI gate: pass. Full test suite is opt-in and documented in README."
