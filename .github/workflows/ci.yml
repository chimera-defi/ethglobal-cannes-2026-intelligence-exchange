name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        # SECURITY: SHA-pinned to prevent tag-swapping supply-chain attacks (CSO-003).
        # To update: gh api repos/actions/checkout/git/ref/tags/v4 | jq .object.sha
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Secret scan
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --redact --config .gitleaks.toml

      - name: Setup Node
        # SECURITY: SHA-pinned (v4.1.0). Update via:
        # gh api repos/actions/setup-node/git/ref/tags/v4 | jq .object.sha
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        # SECURITY: SHA-pinned to full 40-char SHA (v2). Update: gh api repos/oven-sh/setup-bun/git/ref/tags/v2 | jq .object.sha
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: latest

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full validation
        run: make validate

      - name: Tokenomics regression demo
        run: make tokenomics-demo
