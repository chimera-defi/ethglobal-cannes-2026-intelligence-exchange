packages:
  - 'apps/*'
  - 'packages/*'
  - 'products/*'
allowBuilds:
  bufferutil: set this to true or false
  es5-ext: set this to true or false
  esbuild: set this to true or false
  keccak: set this to true or false
  msgpackr-extract: set this to true or false
  utf-8-validate: set this to true or false
onlyBuiltDependencies:
  - bufferutil
  - es5-ext
  - esbuild
  - keccak
  - msgpackr-extract
  - utf-8-validate
overrides:
  '@hono/node-server@<1.19.13': '>=1.19.13'
  axios@<0.30.0: '>=0.30.0'
  axios@<0.31.0: '>=0.31.0'
  axios@<=0.30.2: '>=0.30.3'
  axios@<=0.31.0: '>=0.31.1'
  axios@>=0.8.1 <0.28.0: '>=0.28.0'
  axios@>=1.0.0 <1.15.0: '>=1.15.0'
  axios@>=1.0.0 <1.15.1: '>=1.15.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  drizzle-orm@<0.45.2: '>=0.45.2'
  esbuild@<=0.24.2: '>=0.25.0'
  follow-redirects@<=1.15.11: '>=1.16.0'
  hono@<4.12.12: '>=4.12.12'
  hono@<4.12.14: '>=4.12.14'
  hono@>=4.0.0 <=4.12.11: '>=4.12.12'
  postcss@<8.5.10: '>=8.5.10'
  uuid@>=11.0.0 <11.1.1: '>=11.1.1'
  vite@<=6.4.1: '>=6.4.2'
