version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iex_local_dev_only_change_me}
      POSTGRES_DB: iex_cannes
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iex -d iex_cannes']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-iex_redis_local_dev_only_change_me}
    command: ['sh', '-c', 'exec redis-server --requirepass "$$REDIS_PASSWORD"']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
